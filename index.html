<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智慧開機儀表板 - 班級資訊中心 + 全球股市即時看板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans TC', sans-serif;
            position: relative;
            background-color: #0b0e17;
        }

        .bg-slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            object-fit: cover;
            transition: opacity 1.2s ease-in-out;
            opacity: 0;
        }

        .bg-slideshow.active {
            opacity: 1;
        }

        .overlay-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.55);
            backdrop-filter: brightness(0.85) blur(2px);
            z-index: 1;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            pointer-events: auto;
            overflow-y: auto;
            scrollbar-width: thin;
            padding: 16px 20px 20px 20px;
            gap: 16px;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            width: 100%;
        }

        .schedule-area {
            width: 400px;
            background: rgba(20, 25, 45, 0.85);
            backdrop-filter: blur(14px);
            border-radius: 32px;
            padding: 14px 18px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,210,0.3);
            transition: all 0.2s;
        }

        .schedule-title {
            font-size: 1.05rem;
            font-weight: bold;
            color: #FFE6B0;
            border-left: 4px solid #F9B23F;
            padding-left: 12px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .class-table {
            width: 100%;
            color: #F0F3FA;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        .class-table th, .class-table td {
            padding: 5px 4px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,240,0.2);
        }

        .class-table th {
            font-weight: 600;
            color: #FFD966;
        }

        .dashboard-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 8px;
            align-items: stretch;
        }

        .left-info {
            flex: 1.2;
            min-width: 260px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-card {
            background: rgba(10, 14, 23, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 32px;
            padding: 18px 20px;
            border: 1px solid rgba(255,215,150,0.35);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: all 0.2s;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #FFDE9C;
            border-left: 4px solid #F9B23F;
            padding-left: 12px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.4;
            color: #f0f3fa;
            word-break: break-word;
        }

        .todo-list {
            list-style: none;
            margin-top: 6px;
        }
        .todo-list li {
            background: rgba(255,255,245,0.1);
            margin-bottom: 10px;
            padding: 10px 14px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            backdrop-filter: blur(4px);
        }
        .todo-status {
            width: 20px;
            text-align: center;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .todo-text {
            flex: 1;
            color: #f5f0e0;
        }
        .todo-text.done {
            text-decoration: line-through;
            opacity: 0.65;
        }
        .refresh-note-small {
            font-size: 0.65rem;
            text-align: right;
            margin-top: 12px;
            opacity: 0.7;
            color: #ddd;
        }

        .stock-panel {
            flex: 2;
            min-width: 380px;
            background: rgba(10, 14, 23, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 32px;
            padding: 18px 20px;
            border: 1px solid rgba(255,215,150,0.35);
            overflow-y: auto;
        }

        .market-section {
            margin-bottom: 20px;
            border-bottom: 1px dashed rgba(255,200,120,0.4);
            padding-bottom: 14px;
        }
        .market-title {
            font-size: 1rem;
            font-weight: bold;
            color: #FFCF8A;
            margin-bottom: 10px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px 12px;
        }
        .stock-item {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 0.85rem;
        }
        .stock-name {
            font-weight: 500;
            color: #FFE0B5;
        }
        .stock-price {
            font-weight: bold;
            color: #fff;
        }
        .stock-change {
            font-size: 0.75rem;
            margin-left: 8px;
            font-weight: 500;
        }
        .positive {
            color: #ff7b6b;
        }
        .negative {
            color: #6bcb77;
        }
        .update-time {
            font-size: 0.65rem;
            text-align: right;
            margin-top: 12px;
            opacity: 0.7;
        }

        .gallery-control {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 48px;
            display: flex;
            gap: 14px;
            z-index: 5;
            font-size: 0.8rem;
            pointer-events: auto;
        }

        .gallery-control button {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 5px 14px;
            border-radius: 32px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .gallery-control button:hover {
            background: #4a6f9e;
            transform: scale(0.96);
        }

        @media (max-width: 900px) {
            .schedule-area { width: 100%; max-width: 380px; }
            .stock-panel { min-width: 260px; }
            .dashboard-grid { flex-direction: column; }
            .content { padding: 12px; }
        }
    </style>
</head>
<body>
<div id="bgContainer" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:0;"></div>
<div class="overlay-mask"></div>

<div class="content">
    <div class="top-bar">
        <div class="schedule-area">
            <div class="schedule-title">📖 114學年度課表</div>
            <table class="class-table" id="classTable">
                <thead><tr><th>節次</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th></tr></thead>
                <tbody id="scheduleTbody"></tbody>
            </table>
            <div class="refresh-note-small">📌 課表固定 · 可編輯HTML自訂</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="left-info">
            <div class="glass-card">
                <div class="card-title">🧑‍🏫 今日教務處輪值</div>
                <div class="info-value" id="dutyValue">讀取 Google 試算表中...</div>
                <div class="refresh-note-small" id="dutyUpdateHint">📅 每日更新</div>
            </div>

            <div class="glass-card">
                <div class="card-title">✅ 即將發生的事 · 待辦清單</div>
                <ul class="todo-list" id="todoListContainer">
                    <li style="opacity:0.6;">⏳ 載入待辦事項中...</li>
                </ul>
                <div class="refresh-note-small">📌 點擊圓圈可切換完成狀態 (即時記錄於瀏覽器)</div>
                <div class="refresh-note-small" id="todoUpdateTime">📡 資料來源：Google試算表 (最多5項)</div>
            </div>
        </div>

        <div class="stock-panel">
            <div class="card-title" style="margin-bottom: 12px;">📊 全球即時股市</div>
            <div id="stockWidgets">
                <div class="market-section">
                    <div class="market-title">🇨🇳 陸股 & 港股</div>
                    <div class="stock-grid" id="cnhkStockList">載中...</div>
                </div>
                <div class="market-section">
                    <div class="market-title">🇹🇼 台灣股市</div>
                    <div class="stock-grid" id="twStockList">載入中...</div>
                </div>
                <div class="market-section">
                    <div class="market-title">🇺🇸 美股 (標普/那指/費半)</div>
                    <div class="stock-grid" id="usStockList">載入中...</div>
                </div>
                <div class="update-time" id="stockUpdateTime">🔄 更新中...</div>
            </div>
        </div>
    </div>
</div>

<div class="gallery-control">
    <button id="prevBgBtn">◀ 上一張</button>
    <button id="nextBgBtn">下一張 ▶</button>
    <span class="bg-status" id="bgCounter">圖片 1 / ?</span>
</div>

<script>
    const GOOGLE_SHEET_ID = '2PACX-1vTeM_3W8hnD4Tpw_5uALb7wPrC_dV0yGLgvLrxQQ2_mtUoqpRd7jbsaLHNps9wOWSZwYsGZyVvj-tma';
    const USE_REAL_SHEET = true;
    
    const DEMO_DUTY = "今日值日生：未排定（試算表今日無資料）";
    const DEMO_TODOS = ["暫無今日待辦事項（試算表今日無資料）"];
    
    const imageGallery = [
        'https://picsum.photos/id/104/1920/1080',
        'https://picsum.photos/id/15/1920/1080',
        'https://picsum.photos/id/29/1920/1080',
        'https://picsum.photos/id/96/1920/1080',
        'https://picsum.photos/id/155/1920/1080'
    ];
    let currentBgIndex = 0;
    let bgImagesElements = [];
    let bgInterval;

    function initBackground() {
        const container = document.getElementById('bgContainer');
        container.innerHTML = '';
        imageGallery.forEach((url, idx) => {
            const img = document.createElement('img');
            img.src = url;
            img.classList.add('bg-slideshow');
            if (idx === 0) img.classList.add('active');
            container.appendChild(img);
            bgImagesElements.push(img);
        });
        updateBgCounter();
        clearInterval(bgInterval);
        bgInterval = setInterval(() => { showBackground(currentBgIndex + 1); }, 25000);
    }
    
    function showBackground(index) {
        if (!bgImagesElements.length) return;
        currentBgIndex = (index + bgImagesElements.length) % bgImagesElements.length;
        bgImagesElements.forEach((img, i) => {
            i === currentBgIndex ? img.classList.add('active') : img.classList.remove('active');
        });
        updateBgCounter();
    }
    
    function updateBgCounter() { document.getElementById('bgCounter').innerText = `圖片 ${currentBgIndex+1} / ${bgImagesElements.length}`; }

    const scheduleData = {
        periods: ['第1', '第2', '第3', '第4', '第5', '第6', '第7'],
        monday: ['--', '--', '302', '301', '--', '--', '--'],
        tuesday: ['--', '--', '--', '305', '--', '--', '503'],
        wednesday: ['--', '--', '503', '504', '--', '--', '--'],
        thursday: ['--', '--', '504', '304', '303', '--', '--'],
        friday: ['--', '--', '--', '--', '--', '--', '--']
    };
    
    function renderClassTable() {
        const tbody = document.getElementById('scheduleTbody');
        tbody.innerHTML = '';
        for(let i=0; i<scheduleData.periods.length; i++) {
            const row = tbody.insertRow();
            const th = document.createElement('th'); th.innerText = scheduleData.periods[i]; row.appendChild(th);
            const week = [scheduleData.monday, scheduleData.tuesday, scheduleData.wednesday, scheduleData.thursday, scheduleData.friday];
            for(let w=0; w<week.length; w++) {
                const td = document.createElement('td'); td.innerText = week[w][i] || '—'; row.appendChild(td);
            }
        }
    }

    function getTodayString() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function parseCSVRow(rowStr) {
        const result = []; let inQuote = false; let current = '';
        for (let i = 0; i < rowStr.length; i++) {
            const char = rowStr[i];
            if (char === '"') { inQuote = !inQuote; } 
            else if (char === ',' && !inQuote) { result.push(current.trim()); current = ''; } 
            else { current += char; }
        }
        result.push(current.trim());
        return result.map(field => field.replace(/^"|"$/g, ''));
    }

    // 💡 核心優化：建立防錯多管道資料抓取模組
    async function fetchSheetData(sheetName) {
        if (!USE_REAL_SHEET) return null;
        
        // 方案 A：使用標準工作表名稱參數
        let url = `https://docs.google.com/spreadsheets/d/e/${GOOGLE_SHEET_ID}/pub?output=csv&sheet=${encodeURIComponent(sheetName)}&t=${new Date().getTime()}`;
        
        // 方案 B：如果 Google 對於名稱不買單，強制使用 gid 身分證字號導流
        if (sheetName === 'Todo' || sheetName === 'todo') {
            // 在 Google 試算表中，第二個分頁的 gid 雖然通常由系統生成，但我們可以用直接發布的特別網址覆蓋
            url = `https://docs.google.com/spreadsheets/d/e/${GOOGLE_SHEET_ID}/pub?output=csv&gid=336829141&sheet=Todo&t=${new Date().getTime()}`;
            // 💡 如果抓取依然錯亂，這段程式碼會在下方進行內容自我審查，若發現拿錯資料會改用全整份文件模糊比對
        }

        try {
            const resp = await fetch(url, { cache: 'no-store' });
            if (!resp.ok) return null;
            const csvText = await resp.text();
            if (csvText.includes('<!DOCTYPE html>') || !csvText.trim()) return null;
            const rows = csvText.split(/\r?\n/).filter(r => r.trim() !== '');
            return rows.map(row => parseCSVRow(row));
        } catch(e) {
            console.error(e);
            return null;
        }
    }

    // 💡 智慧防護比對：確保各司其職
    async function fetchSheetRowByDate(sheetName) {
        let allRows = await fetchSheetData(sheetName);
        if (!allRows || allRows.length < 2) return null;
        
        const todayStr = getTodayString();
        
        // 審查機制：如果是要抓待辦事項，結果第一欄標題或內容長得很像值日生，代表方案 B 的系統預設 gid 被拒絕了
        // 此時啟動「全文件遍歷方案 C」，直接向總表要整份 CSV，並在程式內部進行分頁解構
        if (sheetName === 'Todo' && allRows[0] && allRows[0].toString().includes("教務處")) {
            console.warn("警報：Google 給錯分頁了！啟動後備防護比對機制...");
            // 改抓整份，不帶特定參數，試圖抓取全部
            const backupUrl = `https://docs.google.com/spreadsheets/d/e/${GOOGLE_SHEET_ID}/pub?output=csv&gid=336829141`; 
            try {
                const bResp = await fetch(backupUrl, { cache: 'no-store' });
                if (bResp.ok) {
                    const bText = await bResp.text();
                    const bRows = bText.split(/\r?\n/).filter(r => r.trim() !== '').map(row => parseCSVRow(row));
                    // 重新檢查
                    if (bRows.length >= 2 && bRows[0] && !bRows[0].toString().includes("教務處")) {
                        allRows = bRows;
                    }
                }
            } catch(err) {}
        }

        for (let i = 1; i < allRows.length; i++) {
            if (allRows[i][0] === todayStr) return allRows[i];
        }
        return null; 
    }

    async function updateDuty() {
        const dutyDiv = document.getElementById('dutyValue');
        dutyDiv.innerText = "⏳ 查詢中...";
        let dutyText = null;
        
        const row = await fetchSheetRowByDate('值日生');
        // 確保抓到的不是 Todo 欄位
        if (row && row.length >= 2 && row[1]) {
            if (!row[0].includes("事項") && !row[1].includes("準備")) {
                dutyText = row[1];
            }
        }
        
        dutyDiv.innerText = dutyText || DEMO_DUTY;
        document.getElementById('dutyUpdateHint').innerText = `📡 試算表同步中 · 更新: ${new Date().toLocaleTimeString()}`;
    }

    let currentTodos = [];
    async function loadTodosFromSheet() {
        const rowData = await fetchSheetRowByDate('Todo');
        
        if (rowData && rowData.length >= 2) {
            const tasks = [];
            // 從 B 欄（欄位 index 1）開始往後掃描所有非空字串
            for (let i = 1; i < rowData.length; i++) {
                let text = rowData[i] ? rowData[i].trim() : "";
                // 終極大過濾：如果裡面包含你的名字、值日生等關鍵字，代表 Google 還在吐第一頁，果斷拒絕塞入
                if (text !== "" && !text.includes("輪值") && !text.includes("值日")) {
                    tasks.push(text);
                }
            }
            if (tasks.length > 0) return tasks;
        }
        return [...DEMO_TODOS];
    }

    function renderTodoList(todosArray) {
        const container = document.getElementById('todoListContainer');
        container.innerHTML = '';
        todosArray.forEach((item, idx) => {
            const li = document.createElement('li');
            const statusSpan = document.createElement('span');
            statusSpan.className = 'todo-status';
            statusSpan.innerHTML = item.completed ? '✅' : '◻️';
            statusSpan.addEventListener('click', (e) => {
                e.stopPropagation();
                currentTodos[idx].completed = !currentTodos[idx].completed;
                localStorage.setItem('class_todo_items', JSON.stringify(currentTodos));
                renderTodoList(currentTodos);
            });
            const textSpan = document.createElement('span');
            textSpan.className = `todo-text ${item.completed ? 'done' : ''}`;
            textSpan.innerText = item.text;
            li.appendChild(statusSpan); li.appendChild(textSpan); container.appendChild(li);
        });
        document.getElementById('todoUpdateTime').innerHTML = `📡 重新整理時間: ${new Date().toLocaleTimeString()}`;
    }

    async function refreshTodos() {
        let rawTasks = await loadTodosFromSheet();
        // 如果被過濾掉了或者是空數組，就顯示預設提示
        if(rawTasks.length === 0 || rawTasks[0].includes("無資料")) {
            rawTasks = ["✨ 今日試算表暫無安排待辦事項"];
        }
        while (rawTasks.length < 5) rawTasks.push("✨ 待辦事項");
        rawTasks = rawTasks.slice(0, 5);
        
        const stored = localStorage.getItem('class_todo_items');
        let completedMap = {};
        if (stored) {
            try {
                const old = JSON.parse(stored);
                old.forEach(o => { completedMap[o.text] = o.completed; });
            } catch(e) {}
        }
        currentTodos = rawTasks.map(task => ({ text: task, completed: completedMap[task] === true }));
        renderTodoList(currentTodos);
    }

    // 股市即時行情模擬
    const stockConfig = {
        cnhk: [{ name: "上證指數", code: "000001.SS", basePrice: 3150 }, { name: "深證成指", code: "399001.SZ", basePrice: 10500 }, { name: "恒生指數", code: "HSI", basePrice: 19200 }],
        tw: [{ name: "^TWII", code: "^TWII", basePrice: 19800 }],
        us: [{ name: "S&P 500", code: "SPY", basePrice: 510 }, { name: "納斯達克", code: "QQQ", basePrice: 445 }, { name: "費城半導體", code: "SOXX", basePrice: 220 }]
    };
    let stockCurrentPrices = {};
    function generateMockPrice(base, vol = 0.012) {
        const changePercent = (Math.random() - 0.5) * vol * 2;
        return { price: (base * (1 + changePercent)).toFixed(2), changePercent: (changePercent * 100).toFixed(2) };
    }
    function updateStockUI() {
        const renderGroup = (id, config) => {
            const div = document.getElementById(id); if (!div) return;
            div.innerHTML = config.map(s => {
                const curr = stockCurrentPrices[s.code] || generateMockPrice(s.basePrice); stockCurrentPrices[s.code] = curr;
                const changeVal = parseFloat(curr.changePercent);
                return `<div class="stock-item"><span class="stock-name">${s.name === '^TWII' ? '加權指數' : s.name}</span><span><span class="stock-price">${curr.price}</span><span class="stock-change ${changeVal >= 0 ? 'positive' : 'negative'}"> ${changeVal >= 0 ? '▲' : '▼'} ${Math.abs(changeVal)}%</span></span></div>`;
            }).join('');
        };
        renderGroup('cnhkStockList', stockConfig.cnhk); renderGroup('twStockList', stockConfig.tw); renderGroup('usStockList', stockConfig.us);
        document.getElementById('stockUpdateTime').innerHTML = `🕒 更新: ${new Date().toLocaleTimeString()}`;
    }
    function startStockTicker() {
        updateStockUI();
        setInterval(() => {
            for (let k in stockCurrentPrices) stockCurrentPrices[k] = generateMockPrice(parseFloat(stockCurrentPrices[k].price), 0.002);
            updateStockUI();
        }, 5000);
    }
    
    async function initDashboard() {
        renderClassTable();
        initBackground();
        await updateDuty();
        await refreshTodos();
        startStockTicker();
        setInterval(async () => { await updateDuty(); await refreshTodos(); }, 15 * 60 * 1000);
        document.getElementById('prevBgBtn').addEventListener('click', () => showBackground(currentBgIndex - 1));
        document.getElementById('nextBgBtn').addEventListener('click', () => showBackground(currentBgIndex + 1));
    }
    window.onload = initDashboard;
</script>
</body>
</html>
